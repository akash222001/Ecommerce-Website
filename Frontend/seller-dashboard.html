<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams - Seller Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfdfd; min-height: 100vh; overflow-y: auto; }
        .dashboard-nav {
            background: linear-gradient(to right, #121214, #000); padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center; color: white;
            position: sticky; top: 0; z-index: 100;
        }
        .dashboard-nav .logo { font-size: 1.8rem; background: linear-gradient(to right, #ff0844, #ffb199); margin-bottom: 0; }
        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .nav-actions button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: 0.3s; }
        .nav-actions button:hover { background: rgba(255,255,255,0.1); }
        .logout-btn { color: #ff416c !important; border-color: #ff416c !important; }

        .dashboard-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .dashboard-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .dashboard-header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; }
        .dashboard-header p { color: var(--text-muted); font-size: 1.1rem; }

        .panel { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); margin-bottom: 40px; border: 1px solid #f0f0f0; }
        
        .add-product-form { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width { grid-column: 1 / -1; }
        
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 20px;}
        .product-card { 
            border-radius: 12px; overflow: hidden; background: #fff; border: 1px solid #eee;
            transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .product-image { width: 100%; height: 200px; background: #f5f5f7; object-fit: cover; }
        .product-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .product-price { font-size: 1.5rem; color: #ff0844; font-weight: 600; margin-bottom: auto;}
    </style>
</head>
<body>

    <nav class="dashboard-nav">
        <h1 class="logo">Dreams Seller Hub</h1>
        <div class="nav-actions">
            <span id="merchantNameDisplay">Welcome, Merchant</span>
            <button onclick="logout()">Log Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="dashboard-header">
            <div>
                <h1>Manage Inventory.</h1>
                <p>Add new luxury items to your catalog.</p>
            </div>
        </div>

        <div class="panel">
            <h2 style="margin-bottom: 24px;">➕ Add New Product</h2>
            <form id="addProductForm" class="add-product-form auth-form">
                
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="prodName" placeholder="e.g. Silk Evening Gown" required>
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <label>Price (₹)</label>
                    <input type="number" step="0.01" id="prodPrice" placeholder="e.g. 599.99" required>
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="prodStock" placeholder="e.g. 50" value="1" required>
                    <div class="input-line"></div>
                </div>
                
                <div class="input-group">
                    <label>Image URL (Optional)</label>
                    <input type="url" id="prodImage" placeholder="https://example.com/image.jpg">
                    <div class="input-line"></div>
                </div>

                <div class="input-group full-width">
                    <label>Description</label>
                    <input type="text" id="prodDesc" placeholder="Describe the luxury details...">
                    <div class="input-line"></div>
                </div>

                <button type="submit" class="btn-primary full-width" style="background: linear-gradient(to right, #000, #333);">
                    <span class="btn-text">List Product on Store</span>
                    <div class="btn-loader"></div>
                </button>
            </form>
        </div>

        <div>
            <h2>📦 Your Current Inventory</h2>
            <div id="inventoryContainer" class="inventory-grid">
            </div>
        </div>

    </div>

    <script src="config.js"></script>
    <script>
        const token = localStorage.getItem('sellerToken');
        if(!token) {
            alert('Unauthorized. Please log in first.');
            window.location.href = 'seller-login.html';
        }

        document.getElementById('merchantNameDisplay').innerText = `Welcome, ${localStorage.getItem('sellerName') || 'Merchant'}`;

        function logout() {
            localStorage.clear();
            window.location.href = 'seller-login.html';
        }

        const inventoryContainer = document.getElementById('inventoryContainer');

        async function fetchMyProducts() {
            try {
                const response = await fetch(`${window.API_URL}/products/seller-inventory`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if(data.success) {
                    inventoryContainer.innerHTML = ''; 
                    
                    if(data.products.length === 0) {
                        inventoryContainer.innerHTML = '<p style="color: grey;">You have not added any products yet.</p>';
                        return;
                    }

                    data.products.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        
                        const imgSource = product.image_url || 'https://via.placeholder.com/400x300?text=No+Image';
                        
                        card.innerHTML = `
                            <img src="${imgSource}" class="product-image" alt="Product">
                            <div class="product-info">
                                <h3 class="product-title">${product.name}</h3>
                                <p style="color: grey; font-size: 0.9rem; margin-bottom: 12px;">Stock: ${product.stock_quantity}</p>
                                <div class="product-price">₹${Number(product.price).toFixed(2)}</div>
                            </div>
                        `;
                        inventoryContainer.appendChild(card);
                    });
                }
            } catch (err) {
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('.btn-primary');
            submitBtn.querySelector('.btn-text').innerText = 'Adding...';
            
            const payload = {
                name: document.getElementById('prodName').value,
                price: document.getElementById('prodPrice').value,
                stock_quantity: document.getElementById('prodStock').value,
                image_url: document.getElementById('prodImage').value,
                description: document.getElementById('prodDesc').value
            };

            try {
                const response = await fetch(`${window.API_URL}/products/add`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if(data.success) {
                    alert('Product successfully listed!');
                    e.target.reset();
                    fetchMyProducts(); 
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Error adding product.');
            } finally {
                submitBtn.querySelector('.btn-text').innerText = 'List Product on Store';
            }
        });

        fetchMyProducts();

    </script>
</body>
</html>
