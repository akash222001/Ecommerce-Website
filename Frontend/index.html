<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams - Store</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #fdfdfd;
            min-height: 100vh;
            overflow-y: auto;
        }

        .store-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .store-nav .logo {
            font-size: 2rem;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            margin-bottom: 0;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-actions button {
            background: #000;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-actions button:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(142, 45, 226, 0.3);
        }

        .logout-btn {
            background: transparent !important;
            color: #ff416c !important;
            border: 1px solid #ff416c !important;
            box-shadow: none !important;
        }

        .logout-btn:hover {
            background: rgba(255, 65, 108, 0.1) !important;
            transform: none !important;
        }

        .store-hero {
            padding: 80px 40px;
            text-align: center;
            background: radial-gradient(circle at center, #f4ebff 0%, #fdfdfd 100%);
        }

        .store-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .store-hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .store-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
        }

        .product-card {
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            border: 1px solid #f0f0f0;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #fafafa;
        }

        .product-info {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-brand {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: #000;
        }

        .add-to-cart {
            background: #f5f5f7;
            color: #000;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            background: #000;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 80px 0;
            grid-column: 1 / -1;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: #a1a1aa;
            margin-bottom: 10px;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            padding: 30px;
            border-left: 1px solid rgba(0, 0, 0, 0.05);
        }

        .cart-overlay.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .cart-header h2 {
            font-size: 1.8rem;
            margin: 0;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #a1a1aa;
            transition: 0.3s;
            padding: 0;
        }

        .close-cart:hover {
            color: #000;
            transform: rotate(90deg);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .cart-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            box-shadow: 0 10px 20px rgba(142, 45, 226, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <nav class="store-nav">
        <h1 class="logo">Dreams</h1>
        <div class="nav-actions">
            <span id="userNameDisplay" style="font-weight: 600;">Welcome, Guest</span>
            <button id="cartBtn" onclick="toggleCart()" style="display: none; background: #f4ebff; color: #8e2de2;">🛒
                Cart</button>
            <button id="authBtn" onclick="handleAuthAction()">Log In</button>
        </div>
    </nav>

    <div class="store-hero">
        <h1>Curated For You.</h1>
        <p>Discover luxury fashion, exclusive artifacts, and premium goods added directly by our elite merchant network.
        </p>
    </div>

    <div class="store-container">
        <div id="storeGrid" class="store-grid">
        </div>
    </div>

    <div id="cartSidebar" class="cart-overlay">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>

        <div id="cartItemsContainer" class="cart-items">
            <p style="text-align: center; color: grey; margin-top: 20px;">Your cart is beautifully empty.</p>
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalPrice">₹0.00</span>
            </div>
            <button id="rzpCheckoutBtn" class="checkout-btn" style="display: none;">Secure Checkout</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const authBtn = document.getElementById('authBtn');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const cartBtn = document.getElementById('cartBtn');
        const cartSidebar = document.getElementById('cartSidebar');
        const rzpCheckoutBtn = document.getElementById('rzpCheckoutBtn');

        if (token && username) {
            userNameDisplay.innerText = `Welcome, ${username}`;
            authBtn.innerText = 'Log Out';
            authBtn.className = 'logout-btn';
            cartBtn.style.display = 'block';
        }

        function toggleCart() {
            cartSidebar.classList.toggle('open');
            if (cartSidebar.classList.contains('open')) {
                loadCartItems();
            }
        }

        async function loadCartItems() {
            try {
                const response = await fetch(`${window.API_URL}/products/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                const container = document.getElementById('cartItemsContainer');
                const totalDisplay = document.getElementById('cartTotalPrice');

                container.innerHTML = '';
                let total = 0;

                if (data.cartItems && data.cartItems.length > 0) {
                    data.cartItems.forEach(item => {
                        const qty = item.cartItem.quantity;
                        const itemTotal = item.price * qty;
                        total += itemTotal;

                        const imgSource = (item.image_url && item.image_url.trim() !== '') ? item.image_url : 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&q=80';

                        container.innerHTML += `
                            <div class="cart-item">
                                <img src="${imgSource}" class="cart-item-img" onerror="this.src='https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&q=80'">
                                <div class="cart-item-details">
                                    <div class="cart-item-title">${item.name}</div>
                                    <div class="cart-item-price">₹${Number(item.price).toFixed(2)} x ${qty}</div>
                                </div>
                                <div style="font-weight: 600;">₹${itemTotal.toFixed(2)}</div>
                            </div>
                        `;
                    });
                    rzpCheckoutBtn.style.display = 'block';
                } else {
                    container.innerHTML = '<p style="text-align: center; color: grey; margin-top: 20px;">Your cart is beautifully empty.</p>';
                    rzpCheckoutBtn.style.display = 'none';
                }

                totalDisplay.innerText = `₹${total.toFixed(2)}`;

            } catch (err) {
            }
        }

        rzpCheckoutBtn.onclick = async function (e) {
            e.preventDefault();

            try {
                const response = await fetch(`${window.API_URL}/purchase/checkout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (!data.success) {
                    alert(data.message || 'Checkout failed to initialize.');
                    return;
                }

                var options = {
                    "key": data.key_id,
                    "order_id": data.order.id,
                    "name": "Dreams Store",
                    "description": "Premium Checkout Transaction",
                    "theme": { "color": "#4a00e0" },
                    "handler": async function (rpResponse) {
                        try {
                            const verifyRes = await fetch(`${window.API_URL}/purchase/update-transaction`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    payment_id: rpResponse.razorpay_payment_id,
                                    order_id: rpResponse.razorpay_order_id,
                                    status: 'SUCCESS'
                                })
                            });

                            const verifyData = await verifyRes.json();
                            if (verifyData.success) {
                                alert("Payment Successful! Your order has been placed. 🎁");
                                toggleCart();
                            }
                        } catch (verifyErr) {
                            alert("Payment succeeded but we couldn't verify it with our servers.");
                        }
                    }
                };

                var rzp1 = new Razorpay(options);

                rzp1.on('payment.failed', async function (rpResponse) {
                    alert("Payment Failed. Reason: " + rpResponse.error.description);
                });

                rzp1.open();

            } catch (err) {
                alert("Failed to connect to the checkout server. Is the backend running?");
            }
        };

        function handleAuthAction() {
            if (token) {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                window.location.reload();
            } else {
                window.location.href = 'login.html';
            }
        }

        async function loadStoreProducts() {
            const grid = document.getElementById('storeGrid');

            try {
                const response = await fetch(`${window.API_URL}/products`);
                const data = await response.json();

                if (data.success) {
                    if (data.products.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <h3>No Products Available Right Now 🛍️</h3>
                                <p style="color: grey;">Our sellers are curating new items. Check back soon!</p>
                            </div>
                        `;
                        return;
                    }

                    data.products.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';

                        const imgSource = (product.image_url && product.image_url.trim() !== '')
                            ? product.image_url
                            : 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&q=80';

                        card.innerHTML = `
                            <img src="${imgSource}" class="product-image" alt="${product.name}" onerror="this.src='https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&q=80'">
                            <div class="product-info">
                                <div class="product-brand">Dreams Exclusive</div>
                                <h3 class="product-title">${product.name}</h3>
                                <p class="product-desc">${product.description || 'A premium selection tailored for luxury.'}</p>
                                
                                <div class="product-footer">
                                    <div class="product-price">₹${Number(product.price).toFixed(2)}</div>
                                    <button class="add-to-cart" onclick="addToCart(${product.id})" title="Add to Cart">
                                        +
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Error loading store catalog.</p>';
            }
        }

        async function addToCart(productId) {
            if (!token) {
                alert("Please log in to add items to your cart!");
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${window.API_URL}/products/cart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ productId: productId })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Item securely added to your cart! 🛍️');
                } else {
                    alert(data.message || 'Failed to add item to cart.');
                }

            } catch (err) {
                alert('A network error occurred while adding to cart.');
            }
        }

        loadStoreProducts();
    </script>
</body>

</html>
